<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Site plan blueprint with parcel boundaries">
  <defs>
    <pattern id="grid-fine-s" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid-coarse-s" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.7"/>
    </pattern>
  </defs>

  <rect width="1600" height="1000" fill="#0d2645"/>
  <rect width="1600" height="1000" fill="url(#grid-fine-s)"/>
  <rect width="1600" height="1000" fill="url(#grid-coarse-s)"/>

  <!-- Title block -->
  <g stroke="rgba(255,255,255,0.45)" stroke-width="1" fill="none">
    <rect x="1240" y="40" width="320" height="120"/>
    <line x1="1240" y1="80" x2="1560" y2="80"/>
    <line x1="1240" y1="120" x2="1560" y2="120"/>
    <line x1="1380" y1="80" x2="1380" y2="160"/>
  </g>
  <text x="1255" y="65" fill="rgba(255,255,255,0.55)" font-family="monospace" font-size="14" letter-spacing="2">BJD-SP-003</text>
  <text x="1255" y="105" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="11" letter-spacing="1">SITE PLAN</text>
  <text x="1255" y="142" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="10">SCALE 1"=30'</text>
  <text x="1395" y="142" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="10">SHEET C-1</text>

  <!-- Site plan: street, lots, building footprints, setbacks, contour lines -->
  <g transform="translate(140, 220)">
    <!-- Street -->
    <rect x="0" y="500" width="1280" height="80" stroke="rgba(255,255,255,0.45)" stroke-width="1" fill="none"/>
    <line x1="0" y1="540" x2="1280" y2="540" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-dasharray="20 12"/>
    <text x="600" y="568" fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="11" letter-spacing="2">PROPOSED ACCESS — 60' R/W</text>

    <!-- Property line (overall site boundary) -->
    <path d="M 60 60 L 1220 60 L 1220 480 L 60 480 Z"
          stroke="rgba(255,255,255,0.85)" stroke-width="2.5"
          stroke-dasharray="14 6 3 6" fill="none"/>

    <!-- Setback line (dashed) -->
    <rect x="100" y="100" width="1080" height="340" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-dasharray="6 4" fill="none"/>

    <!-- Individual lots (5) -->
    <g stroke="rgba(255,255,255,0.7)" stroke-width="1.5" fill="none">
      <line x1="296" y1="60" x2="296" y2="480"/>
      <line x1="528" y1="60" x2="528" y2="480"/>
      <line x1="760" y1="60" x2="760" y2="480"/>
      <line x1="992" y1="60" x2="992" y2="480"/>
    </g>

    <!-- Building footprints -->
    <g stroke="rgba(255,255,255,0.85)" stroke-width="2" fill="rgba(255,255,255,0.06)">
      <rect x="140" y="180" width="120" height="200"/>
      <rect x="372" y="180" width="120" height="200"/>
      <rect x="604" y="180" width="120" height="200"/>
      <rect x="836" y="180" width="120" height="200"/>
      <rect x="1036" y="180" width="120" height="200"/>
    </g>

    <!-- Driveways -->
    <g stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none">
      <rect x="170" y="380" width="60" height="100"/>
      <rect x="402" y="380" width="60" height="100"/>
      <rect x="634" y="380" width="60" height="100"/>
      <rect x="866" y="380" width="60" height="100"/>
      <rect x="1066" y="380" width="60" height="100"/>
    </g>

    <!-- Lot labels -->
    <g fill="rgba(255,255,255,0.55)" font-family="monospace" font-size="13" letter-spacing="2">
      <text x="170" y="105">LOT 1</text>
      <text x="402" y="105">LOT 2</text>
      <text x="634" y="105">LOT 3</text>
      <text x="866" y="105">LOT 4</text>
      <text x="1066" y="105">LOT 5</text>
    </g>

    <!-- Trees (existing vegetation) -->
    <g stroke="rgba(255,255,255,0.35)" stroke-width="1" fill="none">
      <circle cx="80" cy="120" r="14"/>
      <circle cx="100" cy="80" r="10"/>
      <circle cx="1180" cy="100" r="12"/>
      <circle cx="1200" cy="140" r="9"/>
      <circle cx="80" cy="440" r="11"/>
      <circle cx="60" cy="400" r="14"/>
    </g>

    <!-- Contour lines -->
    <g stroke="rgba(255,255,255,0.25)" stroke-width="0.8" fill="none">
      <path d="M 0 200 Q 320 180 640 220 T 1280 240"/>
      <path d="M 0 240 Q 320 220 640 260 T 1280 280"/>
      <path d="M 0 280 Q 320 260 640 300 T 1280 320"/>
    </g>
    <text x="20" y="195" fill="rgba(255,255,255,0.3)" font-family="monospace" font-size="10">240</text>
    <text x="20" y="235" fill="rgba(255,255,255,0.3)" font-family="monospace" font-size="10">242</text>
    <text x="20" y="275" fill="rgba(255,255,255,0.3)" font-family="monospace" font-size="10">244</text>

    <!-- Dimensions on outer property -->
    <g stroke="rgba(255,255,255,0.35)" stroke-width="0.7" fill="none">
      <line x1="60" y1="40" x2="1220" y2="40"/>
      <line x1="60" y1="35" x2="60" y2="45"/>
      <line x1="1220" y1="35" x2="1220" y2="45"/>
    </g>
    <text x="600" y="32" fill="rgba(255,255,255,0.45)" font-family="monospace" font-size="11">580'-0"</text>
  </g>

  <!-- North arrow -->
  <g transform="translate(120, 880)" stroke="rgba(255,255,255,0.5)" fill="none" stroke-width="1.5">
    <circle cx="0" cy="0" r="35"/>
    <path d="M 0 -25 L -10 15 L 0 5 L 10 15 Z" fill="rgba(255,255,255,0.5)" stroke="none"/>
    <text x="-5" y="-40" fill="rgba(255,255,255,0.6)" font-family="monospace" font-size="14" font-weight="700">N</text>
  </g>

  <!-- Legend -->
  <g transform="translate(1380, 720)" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)">
    <text x="0" y="0" font-size="11" letter-spacing="1.5">LEGEND</text>
    <line x1="0" y1="20" x2="30" y2="20" stroke="rgba(255,255,255,0.85)" stroke-width="2.5" stroke-dasharray="8 3 2 3"/>
    <text x="40" y="24">PROPERTY LINE</text>
    <line x1="0" y1="44" x2="30" y2="44" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="40" y="48">SETBACK</text>
    <path d="M 0 68 Q 15 64 30 68" stroke="rgba(255,255,255,0.3)" fill="none"/>
    <text x="40" y="72">CONTOUR</text>
  </g>
</svg>
