<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Architectural floor plan blueprint">
  <defs>
    <pattern id="grid-fine" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid-coarse" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.7"/>
    </pattern>
  </defs>

  <!-- Blueprint paper background -->
  <rect width="1600" height="1000" fill="#0d2645"/>
  <rect width="1600" height="1000" fill="url(#grid-fine)"/>
  <rect width="1600" height="1000" fill="url(#grid-coarse)"/>

  <!-- Title block (top right) -->
  <g stroke="rgba(255,255,255,0.45)" stroke-width="1" fill="none">
    <rect x="1240" y="40" width="320" height="120"/>
    <line x1="1240" y1="80" x2="1560" y2="80"/>
    <line x1="1240" y1="120" x2="1560" y2="120"/>
    <line x1="1380" y1="80" x2="1380" y2="160"/>
  </g>
  <text x="1255" y="65" fill="rgba(255,255,255,0.55)" font-family="monospace" font-size="14" letter-spacing="2">BJD-PL-001</text>
  <text x="1255" y="105" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="11" letter-spacing="1">FLOOR PLAN — LEVEL 1</text>
  <text x="1255" y="142" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="10">SCALE 1/4"=1'</text>
  <text x="1395" y="142" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="10">SHEET A-1</text>

  <!-- Main floor plan — 2-story spec home -->
  <g stroke="rgba(255,255,255,0.7)" stroke-width="2.5" fill="none" transform="translate(220, 200)">
    <!-- Outer walls -->
    <rect x="0" y="0" width="900" height="600"/>
    <!-- Inner wall divisions -->
    <line x1="0" y1="220" x2="540" y2="220"/>
    <line x1="540" y1="0" x2="540" y2="600"/>
    <line x1="540" y1="320" x2="900" y2="320"/>
    <line x1="280" y1="220" x2="280" y2="450"/>
    <line x1="0" y1="450" x2="540" y2="450"/>
    <line x1="700" y1="320" x2="700" y2="600"/>

    <!-- Doors (arc swings) -->
    <path d="M 280 220 A 60 60 0 0 1 340 280" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <line x1="280" y1="220" x2="340" y2="220" stroke="rgba(255,255,255,0.5)"/>
    <path d="M 540 320 A 60 60 0 0 0 600 380" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <line x1="540" y1="320" x2="540" y2="380" stroke="rgba(255,255,255,0.5)"/>
    <path d="M 700 450 A 50 50 0 0 1 750 500" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>

    <!-- Windows -->
    <line x1="100" y1="0" x2="200" y2="0" stroke="rgba(255,255,255,0.9)" stroke-width="5"/>
    <line x1="100" y1="-3" x2="200" y2="-3" stroke="rgba(13,38,69,1)" stroke-width="3"/>
    <line x1="350" y1="0" x2="450" y2="0" stroke="rgba(255,255,255,0.9)" stroke-width="5"/>
    <line x1="350" y1="-3" x2="450" y2="-3" stroke="rgba(13,38,69,1)" stroke-width="3"/>
    <line x1="650" y1="0" x2="800" y2="0" stroke="rgba(255,255,255,0.9)" stroke-width="5"/>
    <line x1="650" y1="-3" x2="800" y2="-3" stroke="rgba(13,38,69,1)" stroke-width="3"/>
    <line x1="900" y1="100" x2="900" y2="220" stroke="rgba(255,255,255,0.9)" stroke-width="5"/>
    <line x1="903" y1="100" x2="903" y2="220" stroke="rgba(13,38,69,1)" stroke-width="3"/>
    <line x1="900" y1="400" x2="900" y2="520" stroke="rgba(255,255,255,0.9)" stroke-width="5"/>
    <line x1="903" y1="400" x2="903" y2="520" stroke="rgba(13,38,69,1)" stroke-width="3"/>

    <!-- Stairs -->
    <g stroke="rgba(255,255,255,0.5)" stroke-width="1">
      <rect x="40" y="240" width="220" height="80"/>
      <line x1="40" y1="260" x2="260" y2="260"/>
      <line x1="40" y1="280" x2="260" y2="280"/>
      <line x1="40" y1="300" x2="260" y2="300"/>
    </g>

    <!-- Kitchen island -->
    <rect x="320" y="80" width="180" height="50" stroke="rgba(255,255,255,0.45)" stroke-width="1" fill="none"/>

    <!-- Room labels -->
    <g fill="rgba(255,255,255,0.5)" font-family="monospace" font-size="14" letter-spacing="2">
      <text x="220" y="130">GREAT ROOM</text>
      <text x="640" y="120">KITCHEN</text>
      <text x="640" y="240">DINING</text>
      <text x="100" y="350">ENTRY</text>
      <text x="350" y="370">PWDR</text>
      <text x="220" y="540">GARAGE</text>
      <text x="600" y="430">PRIMARY</text>
      <text x="600" y="540">BATH</text>
      <text x="730" y="540">CL</text>
    </g>

    <!-- Dimensions -->
    <g stroke="rgba(255,255,255,0.35)" stroke-width="0.7" fill="none">
      <line x1="0" y1="-30" x2="900" y2="-30"/>
      <line x1="0" y1="-25" x2="0" y2="-35"/>
      <line x1="900" y1="-25" x2="900" y2="-35"/>
      <line x1="-30" y1="0" x2="-30" y2="600"/>
      <line x1="-35" y1="0" x2="-25" y2="0"/>
      <line x1="-35" y1="600" x2="-25" y2="600"/>
    </g>
    <text x="430" y="-38" fill="rgba(255,255,255,0.45)" font-family="monospace" font-size="11">45'-0"</text>
    <text x="-65" y="305" fill="rgba(255,255,255,0.45)" font-family="monospace" font-size="11" transform="rotate(-90 -65 305)">30'-0"</text>
  </g>

  <!-- North arrow -->
  <g transform="translate(120, 880)" stroke="rgba(255,255,255,0.5)" fill="none" stroke-width="1.5">
    <circle cx="0" cy="0" r="35"/>
    <path d="M 0 -25 L -10 15 L 0 5 L 10 15 Z" fill="rgba(255,255,255,0.5)" stroke="none"/>
    <text x="-5" y="-40" fill="rgba(255,255,255,0.6)" font-family="monospace" font-size="14" font-weight="700">N</text>
  </g>

  <!-- Scale bar -->
  <g transform="translate(1380, 880)" stroke="rgba(255,255,255,0.5)" stroke-width="1" fill="none">
    <rect x="0" y="0" width="40" height="8" fill="rgba(255,255,255,0.6)" stroke="none"/>
    <rect x="40" y="0" width="40" height="8"/>
    <rect x="80" y="0" width="40" height="8" fill="rgba(255,255,255,0.6)" stroke="none"/>
    <rect x="120" y="0" width="40" height="8"/>
    <text x="0" y="28" fill="rgba(255,255,255,0.5)" font-family="monospace" font-size="10">0</text>
    <text x="75" y="28" fill="rgba(255,255,255,0.5)" font-family="monospace" font-size="10">10'</text>
    <text x="150" y="28" fill="rgba(255,255,255,0.5)" font-family="monospace" font-size="10">20'</text>
  </g>
</svg>
