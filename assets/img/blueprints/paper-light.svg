<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Blueprint paper texture">
  <defs>
    <pattern id="grid-light-fine" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(27,79,138,0.07)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid-light-coarse" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(27,79,138,0.13)" stroke-width="0.7"/>
    </pattern>
  </defs>

  <rect width="1600" height="1000" fill="#f3f0e6"/>
  <rect width="1600" height="1000" fill="url(#grid-light-fine)"/>
  <rect width="1600" height="1000" fill="url(#grid-light-coarse)"/>

  <!-- Subtle technical drawing fragments scattered for texture -->
  <g stroke="rgba(27,79,138,0.18)" fill="none" stroke-width="1">
    <!-- Top right: floor plan corner fragment -->
    <g transform="translate(1100, 80)">
      <rect x="0" y="0" width="380" height="240"/>
      <line x1="0" y1="120" x2="220" y2="120"/>
      <line x1="220" y1="0" x2="220" y2="240"/>
      <line x1="220" y1="160" x2="380" y2="160"/>
      <!-- window -->
      <line x1="40" y1="0" x2="120" y2="0" stroke="rgba(27,79,138,0.3)" stroke-width="3"/>
      <line x1="280" y1="0" x2="340" y2="0" stroke="rgba(27,79,138,0.3)" stroke-width="3"/>
    </g>
    <!-- Bottom left: dimension callout fragment -->
    <g transform="translate(80, 800)">
      <line x1="0" y1="40" x2="240" y2="40" stroke-width="0.7"/>
      <line x1="0" y1="35" x2="0" y2="45"/>
      <line x1="240" y1="35" x2="240" y2="45"/>
      <text x="100" y="32" fill="rgba(27,79,138,0.3)" font-family="monospace" font-size="11">24'-0"</text>
    </g>
    <!-- Bottom right: title block fragment -->
    <g transform="translate(1380, 920)">
      <rect x="0" y="0" width="180" height="60"/>
      <line x1="0" y1="20" x2="180" y2="20"/>
      <text x="8" y="14" fill="rgba(27,79,138,0.3)" font-family="monospace" font-size="10" letter-spacing="2">BJD</text>
      <text x="8" y="35" fill="rgba(27,79,138,0.3)" font-family="monospace" font-size="9">RESIDENTIAL</text>
      <text x="8" y="50" fill="rgba(27,79,138,0.3)" font-family="monospace" font-size="9">DEVELOPMENT</text>
    </g>
  </g>
</svg>
