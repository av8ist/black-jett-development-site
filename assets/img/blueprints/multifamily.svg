<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Architectural building elevation blueprint">
  <defs>
    <pattern id="grid-fine-e" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid-coarse-e" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.7"/>
    </pattern>
  </defs>

  <rect width="1600" height="1000" fill="#0d2645"/>
  <rect width="1600" height="1000" fill="url(#grid-fine-e)"/>
  <rect width="1600" height="1000" fill="url(#grid-coarse-e)"/>

  <!-- Title block -->
  <g stroke="rgba(255,255,255,0.45)" stroke-width="1" fill="none">
    <rect x="1240" y="40" width="320" height="120"/>
    <line x1="1240" y1="80" x2="1560" y2="80"/>
    <line x1="1240" y1="120" x2="1560" y2="120"/>
    <line x1="1380" y1="80" x2="1380" y2="160"/>
  </g>
  <text x="1255" y="65" fill="rgba(255,255,255,0.55)" font-family="monospace" font-size="14" letter-spacing="2">BJD-EL-002</text>
  <text x="1255" y="105" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="11" letter-spacing="1">FRONT ELEVATION</text>
  <text x="1255" y="142" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="10">SCALE 1/8"=1'</text>
  <text x="1395" y="142" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="10">SHEET A-3</text>

  <!-- Multifamily building elevation — 3 stories, 6 units across -->
  <g stroke="rgba(255,255,255,0.7)" stroke-width="2.5" fill="none" transform="translate(180, 280)">
    <!-- Ground line -->
    <line x1="-50" y1="500" x2="1280" y2="500" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <g stroke="rgba(255,255,255,0.4)" stroke-width="1">
      <line x1="-30" y1="500" x2="-50" y2="520"/>
      <line x1="0" y1="500" x2="-20" y2="520"/>
      <line x1="30" y1="500" x2="10" y2="520"/>
      <line x1="60" y1="500" x2="40" y2="520"/>
      <line x1="1230" y1="500" x2="1210" y2="520"/>
      <line x1="1260" y1="500" x2="1240" y2="520"/>
    </g>

    <!-- Building footprint -->
    <rect x="0" y="0" width="1200" height="500"/>

    <!-- Roof line (low pitch) -->
    <path d="M -40 0 L 600 -90 L 1240 0"/>
    <line x1="-40" y1="0" x2="-20" y2="20"/>
    <line x1="1240" y1="0" x2="1220" y2="20"/>

    <!-- Floor lines -->
    <line x1="0" y1="170" x2="1200" y2="170" stroke="rgba(255,255,255,0.5)"/>
    <line x1="0" y1="335" x2="1200" y2="335" stroke="rgba(255,255,255,0.5)"/>

    <!-- Vertical bay separators (every 200px = 1 unit width) -->
    <g stroke="rgba(255,255,255,0.35)" stroke-width="1">
      <line x1="200" y1="0" x2="200" y2="500"/>
      <line x1="400" y1="0" x2="400" y2="500"/>
      <line x1="600" y1="0" x2="600" y2="500"/>
      <line x1="800" y1="0" x2="800" y2="500"/>
      <line x1="1000" y1="0" x2="1000" y2="500"/>
    </g>

    <!-- Windows (3 floors × 6 bays = 18 windows; entry doors on ground floor) -->
    <g stroke="rgba(255,255,255,0.85)" stroke-width="1.5" fill="rgba(255,255,255,0.08)">
      <!-- Floor 3 -->
      <rect x="50" y="40" width="100" height="100"/>
      <rect x="250" y="40" width="100" height="100"/>
      <rect x="450" y="40" width="100" height="100"/>
      <rect x="650" y="40" width="100" height="100"/>
      <rect x="850" y="40" width="100" height="100"/>
      <rect x="1050" y="40" width="100" height="100"/>
      <!-- Floor 2 -->
      <rect x="50" y="205" width="100" height="100"/>
      <rect x="250" y="205" width="100" height="100"/>
      <rect x="450" y="205" width="100" height="100"/>
      <rect x="650" y="205" width="100" height="100"/>
      <rect x="850" y="205" width="100" height="100"/>
      <rect x="1050" y="205" width="100" height="100"/>
    </g>
    <!-- Window mullions -->
    <g stroke="rgba(255,255,255,0.85)" stroke-width="1">
      <line x1="100" y1="40" x2="100" y2="140"/>
      <line x1="300" y1="40" x2="300" y2="140"/>
      <line x1="500" y1="40" x2="500" y2="140"/>
      <line x1="700" y1="40" x2="700" y2="140"/>
      <line x1="900" y1="40" x2="900" y2="140"/>
      <line x1="1100" y1="40" x2="1100" y2="140"/>
      <line x1="50" y1="90" x2="150" y2="90"/>
      <line x1="250" y1="90" x2="350" y2="90"/>
      <line x1="450" y1="90" x2="550" y2="90"/>
      <line x1="650" y1="90" x2="750" y2="90"/>
      <line x1="850" y1="90" x2="950" y2="90"/>
      <line x1="1050" y1="90" x2="1150" y2="90"/>
      <line x1="100" y1="205" x2="100" y2="305"/>
      <line x1="300" y1="205" x2="300" y2="305"/>
      <line x1="500" y1="205" x2="500" y2="305"/>
      <line x1="700" y1="205" x2="700" y2="305"/>
      <line x1="900" y1="205" x2="900" y2="305"/>
      <line x1="1100" y1="205" x2="1100" y2="305"/>
      <line x1="50" y1="255" x2="150" y2="255"/>
      <line x1="250" y1="255" x2="350" y2="255"/>
      <line x1="450" y1="255" x2="550" y2="255"/>
      <line x1="650" y1="255" x2="750" y2="255"/>
      <line x1="850" y1="255" x2="950" y2="255"/>
      <line x1="1050" y1="255" x2="1150" y2="255"/>
    </g>

    <!-- Ground floor: alternating doors and windows -->
    <g stroke="rgba(255,255,255,0.85)" stroke-width="1.5" fill="rgba(255,255,255,0.05)">
      <rect x="60" y="385" width="80" height="115"/>
      <rect x="260" y="370" width="80" height="80"/>
      <rect x="460" y="385" width="80" height="115"/>
      <rect x="660" y="370" width="80" height="80"/>
      <rect x="860" y="385" width="80" height="115"/>
      <rect x="1060" y="370" width="80" height="80"/>
    </g>

    <!-- Floor labels -->
    <g fill="rgba(255,255,255,0.45)" font-family="monospace" font-size="11" letter-spacing="1">
      <text x="-90" y="95">L3</text>
      <text x="-90" y="260">L2</text>
      <text x="-90" y="425">L1</text>
    </g>

    <!-- Dimensions -->
    <g stroke="rgba(255,255,255,0.35)" stroke-width="0.7" fill="none">
      <line x1="0" y1="540" x2="1200" y2="540"/>
      <line x1="0" y1="535" x2="0" y2="545"/>
      <line x1="1200" y1="535" x2="1200" y2="545"/>
    </g>
    <text x="570" y="558" fill="rgba(255,255,255,0.45)" font-family="monospace" font-size="11">120'-0"</text>
  </g>

  <!-- Scale bar -->
  <g transform="translate(1380, 880)" stroke="rgba(255,255,255,0.5)" stroke-width="1" fill="none">
    <rect x="0" y="0" width="40" height="8" fill="rgba(255,255,255,0.6)" stroke="none"/>
    <rect x="40" y="0" width="40" height="8"/>
    <rect x="80" y="0" width="40" height="8" fill="rgba(255,255,255,0.6)" stroke="none"/>
    <rect x="120" y="0" width="40" height="8"/>
    <text x="0" y="28" fill="rgba(255,255,255,0.5)" font-family="monospace" font-size="10">0</text>
    <text x="75" y="28" fill="rgba(255,255,255,0.5)" font-family="monospace" font-size="10">20'</text>
    <text x="150" y="28" fill="rgba(255,255,255,0.5)" font-family="monospace" font-size="10">40'</text>
  </g>
</svg>
