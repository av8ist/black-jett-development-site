<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Architectural blueprint composition">
  <defs>
    <pattern id="grid-fine-h" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid-coarse-h" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="0.7"/>
    </pattern>
    <radialGradient id="vignette-h" cx="30%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0d2645" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d2645" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1000" fill="#0d2645"/>
  <rect width="1600" height="1000" fill="url(#grid-fine-h)"/>
  <rect width="1600" height="1000" fill="url(#grid-coarse-h)"/>

  <!-- Right side: floor plan composition -->
  <g transform="translate(820, 240)" stroke="rgba(255,255,255,0.55)" stroke-width="2" fill="none" opacity="0.85">
    <rect x="0" y="0" width="700" height="500"/>
    <line x1="0" y1="180" x2="420" y2="180"/>
    <line x1="420" y1="0" x2="420" y2="500"/>
    <line x1="420" y1="280" x2="700" y2="280"/>
    <line x1="220" y1="180" x2="220" y2="380"/>
    <line x1="0" y1="380" x2="420" y2="380"/>
    <line x1="540" y1="280" x2="540" y2="500"/>

    <!-- door arcs -->
    <path d="M 220 180 A 50 50 0 0 1 270 230" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
    <line x1="220" y1="180" x2="270" y2="180" stroke="rgba(255,255,255,0.4)"/>
    <path d="M 420 280 A 50 50 0 0 0 470 330" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
    <line x1="420" y1="280" x2="420" y2="330" stroke="rgba(255,255,255,0.4)"/>

    <!-- Windows -->
    <g stroke="rgba(255,255,255,0.85)" stroke-width="4">
      <line x1="80" y1="0" x2="160" y2="0"/>
      <line x1="280" y1="0" x2="380" y2="0"/>
      <line x1="500" y1="0" x2="640" y2="0"/>
      <line x1="700" y1="80" x2="700" y2="180"/>
      <line x1="700" y1="340" x2="700" y2="450"/>
    </g>

    <!-- Stairs -->
    <g stroke="rgba(255,255,255,0.4)" stroke-width="1">
      <rect x="40" y="200" width="160" height="60"/>
      <line x1="40" y1="220" x2="200" y2="220"/>
      <line x1="40" y1="240" x2="200" y2="240"/>
    </g>
  </g>

  <!-- Left side: building elevation (smaller, layered) -->
  <g transform="translate(160, 460)" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none" opacity="0.8">
    <line x1="-30" y1="320" x2="640" y2="320" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <rect x="0" y="0" width="600" height="320"/>
    <path d="M -20 0 L 300 -60 L 620 0"/>
    <line x1="0" y1="110" x2="600" y2="110" stroke="rgba(255,255,255,0.35)"/>
    <line x1="0" y1="220" x2="600" y2="220" stroke="rgba(255,255,255,0.35)"/>
    <g stroke="rgba(255,255,255,0.7)" stroke-width="1" fill="rgba(255,255,255,0.06)">
      <rect x="40" y="30" width="70" height="60"/>
      <rect x="160" y="30" width="70" height="60"/>
      <rect x="280" y="30" width="70" height="60"/>
      <rect x="400" y="30" width="70" height="60"/>
      <rect x="520" y="30" width="60" height="60"/>
      <rect x="40" y="140" width="70" height="60"/>
      <rect x="160" y="140" width="70" height="60"/>
      <rect x="280" y="140" width="70" height="60"/>
      <rect x="400" y="140" width="70" height="60"/>
      <rect x="520" y="140" width="60" height="60"/>
      <rect x="40" y="250" width="50" height="70"/>
      <rect x="180" y="250" width="50" height="70"/>
      <rect x="320" y="250" width="50" height="70"/>
      <rect x="460" y="250" width="50" height="70"/>
    </g>
  </g>

  <!-- Title block -->
  <g stroke="rgba(255,255,255,0.45)" stroke-width="1" fill="none">
    <rect x="1240" y="40" width="320" height="120"/>
    <line x1="1240" y1="80" x2="1560" y2="80"/>
    <line x1="1240" y1="120" x2="1560" y2="120"/>
    <line x1="1380" y1="80" x2="1380" y2="160"/>
  </g>
  <text x="1255" y="65" fill="rgba(255,255,255,0.55)" font-family="monospace" font-size="14" letter-spacing="2">BJD-CV-001</text>
  <text x="1255" y="105" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="11" letter-spacing="1">RESIDENTIAL DEVELOPMENT</text>
  <text x="1255" y="142" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="10">SCALE: VARIES</text>
  <text x="1395" y="142" fill="rgba(255,255,255,0.35)" font-family="monospace" font-size="10">SHEET 00</text>

  <!-- Vignette overlay to keep left side darker for hero text -->
  <rect width="1600" height="1000" fill="url(#vignette-h)"/>
</svg>
